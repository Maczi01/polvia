version: '3.8'
services:
    postgres:
        image: postgres:15
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: mydb
        ports:
            - '5433:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:latest
        restart: always
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        command: redis-server --appendonly yes

volumes:
    postgres_data:
    redis_data:
